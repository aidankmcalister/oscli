name: Release

on:
  push:
    branches:
      - main

env:
  BUN_VERSION: 1.3.10

permissions:
  contents: read

jobs:
  release:
    if: github.repository == 'aidankmcalister/oscli'
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install Bun
        run: |
          npm install --global "bun@${BUN_VERSION}"
          echo "$(npm config get prefix)/bin" >> "$GITHUB_PATH"
          bun --revision

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build package
        run: bun run build

      - name: Read oscli package metadata
        id: oscli_meta
        run: |
          echo "name=$(jq -r '.name' packages/oscli/package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' packages/oscli/package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if oscli version is already published
        id: oscli_npm
        run: |
          if npm view "${{ steps.oscli_meta.outputs.name }}@${{ steps.oscli_meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Read react package metadata
        id: react_meta
        run: |
          echo "name=$(jq -r '.name' packages/react/package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' packages/react/package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if react version is already published
        id: react_npm
        run: |
          if npm view "${{ steps.react_meta.outputs.name }}@${{ steps.react_meta.outputs.version }}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read latest tag
        id: latest_tag
        run: |
          tag="$(git tag --sort=-v:refname | head -n 1)"
          if [ -z "$tag" ]; then
            tag="v0.0.0"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: ${{ steps.latest_tag.outputs.tag != format('v{0}', steps.oscli_meta.outputs.version) }}
        uses: release-drafter/release-drafter@v6
        with:
          version: ${{ steps.oscli_meta.outputs.version }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @oscli-dev/oscli to NPM
        if: ${{ steps.oscli_npm.outputs.should_publish == 'true' }}
        working-directory: packages/oscli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @oscli-dev/react to NPM
        if: ${{ steps.react_npm.outputs.should_publish == 'true' }}
        working-directory: packages/react
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
